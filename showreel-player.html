<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Showreel Player</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700&display=swap" rel="stylesheet">

  <style>
    /* ==========================================================================
       SHOWREEL VIDEO PLAYER STYLING
       ========================================================================== */

    :root {
      /* CUSTOMIZABLE TOKENS - Edit these to style your showreel player */
      --vcp-border-radius: 16px;
      --vcp-aspect-ratio: 16/9;
      --vcp-max-width: 960px;

      /* Play/Pause Button */
      --vcp-play-btn-size: 64px;
      --vcp-play-btn-radius: 50%;
      --vcp-play-btn-bg: #ffffff;
      --vcp-play-btn-color: #000000;
      --vcp-play-btn-hover: 1.1;

      /* Volume & Mute Controls */
      --vcp-volume-color: #ffffff;
      --vcp-volume-bg: #000000;
      --vcp-volume-bg-opacity: 0.75;
    }

    /* Reset and Centered Page Wrapper */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background-color: #08090c;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      overflow: hidden;
    }

    /* Main Component Wrapper */
    .vcp-component {
      position: relative;
      width: 100%;
      max-width: var(--vcp-max-width);
      margin: 0 auto;
      border-radius: var(--vcp-border-radius);
      overflow: hidden;
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.6), 0 0 1px rgba(255, 255, 255, 0.15);
      background-color: #000000;
    }

    /* Hide default cursor when inside the player */
    .vcp-component:hover {
      cursor: none;
    }

    /* Video aspect ratio box wrapper */
    .vcp-video-wrapper {
      position: relative;
      width: 100%;
      aspect-ratio: var(--vcp-aspect-ratio);
    }

    .vcp-video-wrapper video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* Center Play/Pause Overlay Button */
    .vcp-play-overlay-btn {
      position: absolute;
      /* JS drives the position via top/left px values */
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: var(--vcp-play-btn-size);
      height: var(--vcp-play-btn-size);
      border-radius: var(--vcp-play-btn-radius);
      background-color: var(--vcp-play-btn-bg);
      color: var(--vcp-play-btn-color);
      border: none;
      /* pointer-events none so it never blocks mouse tracking on the container */
      pointer-events: none;
      cursor: none;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 6;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
      /* Fast follow for position, smooth ease for scale/opacity */
      transition: opacity 0.3s ease, top 0.08s ease-out, left 0.08s ease-out, transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
      will-change: top, left, transform, opacity;
    }

    .vcp-play-overlay-btn svg {
      width: calc(var(--vcp-play-btn-size) * 0.375);
      height: calc(var(--vcp-play-btn-size) * 0.375);
      pointer-events: none;
    }

    /* Snap-back state: smooth ease to center when mouse leaves */
    .vcp-play-overlay-btn.snap-back {
      transition: opacity 0.3s ease, top 0.5s cubic-bezier(0.25, 1, 0.5, 1), left 0.5s cubic-bezier(0.25, 1, 0.5, 1), transform 0.5s cubic-bezier(0.25, 1, 0.5, 1);
    }

    /* Scale up slightly when playing to indicate pause action */
    .vcp-play-overlay-btn.playing-scale {
      transform: translate(-50%, -50%) scale(1.08);
    }

    /* Play state: fades when playing, reappears on hover */
    .vcp-play-overlay-btn.playing {
      opacity: 0;
    }

    .vcp-component:hover .vcp-play-overlay-btn.playing {
      opacity: 0.9;
    }

    /* Hide the follow-cursor button when mouse is over volume controls */
    .vcp-component:has(#volume-controls-overlay:hover) .vcp-play-overlay-btn {
      opacity: 0 !important;
      transition: opacity 0.15s ease !important;
    }

    /* Volume controls overlay styling */
    .vcp-volume-controls {
      position: absolute;
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 8px;
      background-color: rgba(0, 0, 0, 0.6);
      border: 1px solid rgba(255,255,255,0.15);
      padding: 12px;
      border-radius: 100px;
      color: var(--vcp-volume-color);
      transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
      backdrop-filter: blur(12px);
      /* One consistent cursor for the entire volume area — no conflict */
      cursor: pointer !important;
    }

    /* All children inherit the same cursor — no switching/blinking */
    .vcp-volume-controls,
    .vcp-volume-controls * {
      cursor: pointer !important;
    }

    /* Corner positions */
    .vcp-volume-controls.top-left    { top: 24px; left: 24px; }
    .vcp-volume-controls.top-right   { top: 24px; right: 24px; }
    .vcp-volume-controls.bottom-left  { bottom: 24px; left: 24px; }
    .vcp-volume-controls.bottom-right { bottom: 24px; right: 24px; }

    .vcp-mute-btn {
      background: none;
      border: none;
      color: inherit;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      border-radius: 50%;
      width: 32px;
      height: 32px;
      transition: background-color 0.2s;
    }

    .vcp-mute-btn:hover {
      background-color: rgba(255,255,255,0.1);
    }

    .vcp-volume-slider-wrapper {
      width: 0;
      overflow: hidden;
      transition: width 0.3s cubic-bezier(0.25, 1, 0.5, 1);
      display: flex;
      align-items: center;
    }

    /* Reveal slider input on volume control wrapper hover */
    .vcp-volume-controls:hover .vcp-volume-slider-wrapper {
      width: 80px;
      margin-right: 4px;
    }

    .vcp-volume-slider {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 4px;
      border-radius: 2px;
      background: rgba(255,255,255,0.25);
      outline: none;
    }

    .vcp-volume-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--vcp-volume-color);
      cursor: pointer;
    }
  </style>
</head>
<body>

  <!-- SINGLE VIDEO PLAYER COMPONENT -->
  <div class="vcp-component" id="showreel-player">

    <!-- Video element -->
    <div class="vcp-video-wrapper">
      <video id="video-element" src="Comp%201.mp4" autoplay muted loop playsinline preload="auto"></video>
    </div>

    <!-- Center Play/Pause Overlay Button -->
    <button class="vcp-play-overlay-btn" id="play-overlay-btn" aria-label="Play Showreel">
      <!-- SVG Play Icon -->
      <svg class="icon-play" width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
        <path d="M8 5v14l11-7z"/>
      </svg>
      <!-- SVG Pause Icon -->
      <svg class="icon-pause" width="24" height="24" viewBox="0 0 24 24" fill="currentColor" style="display:none;">
        <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
      </svg>
    </button>

    <!-- Mute / Volume Overlay controls (Top Right) -->
    <div class="vcp-volume-controls top-right" id="volume-controls-overlay">
      <button class="vcp-mute-btn" id="mute-overlay-btn" aria-label="Toggle Mute">
        <!-- Muted Icon -->
        <svg class="icon-muted" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
          <line x1="23" y1="9" x2="17" y2="15"></line>
          <line x1="17" y1="9" x2="23" y2="15"></line>
        </svg>
        <!-- Low Volume Icon -->
        <svg class="icon-volume-low" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
          <path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
        </svg>
        <!-- High Volume Icon -->
        <svg class="icon-volume-high" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
          <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path>
        </svg>
      </button>
      <div class="vcp-volume-slider-wrapper">
        <input type="range" class="vcp-volume-slider" id="volume-overlay-slider" min="0" max="1" step="0.05" value="0.8" aria-label="Volume Slider">
      </div>
    </div>

  </div>

  <script>
    /**
     * Showreel Video Player - Standalone Script
     */

    document.addEventListener("DOMContentLoaded", () => {
      const video     = document.getElementById("video-element");
      const playBtn   = document.getElementById("play-overlay-btn");
      const muteBtn   = document.getElementById("mute-overlay-btn");
      const volSlider = document.getElementById("volume-overlay-slider");
      const component = document.getElementById("showreel-player");

      let isMuted     = true;
      let savedVolume = 0.8;

      // Set default initial volume state
      video.volume = savedVolume;
      updateVolumeUI();

      // Toggle play on overlay button click
      playBtn.addEventListener("click", togglePlay);

      // Toggle play when clicking the video element directly
      component.addEventListener("click", (e) => {
        if (e.target.closest("#volume-controls-overlay") || e.target.closest("#play-overlay-btn")) return;
        togglePlay();
      });

      // Toggle mute on click
      muteBtn.addEventListener("click", () => {
        isMuted = !isMuted;
        video.muted = isMuted;
        updateVolumeUI();
      });

      // Adjust volume via slider
      volSlider.addEventListener("input", (e) => {
        const val   = parseFloat(e.target.value);
        savedVolume = val;
        video.volume = val;
        isMuted     = val === 0;
        video.muted = isMuted;
        updateVolumeUI();
      });

      // Sync UI when video play state changes externally
      video.addEventListener("play",  updatePlayStateUI);
      video.addEventListener("pause", updatePlayStateUI);

      function togglePlay() {
        if (video.paused) {
          video.play().catch(() => {
            video.muted = true;
            isMuted = true;
            updateVolumeUI();
            video.play();
          });
        } else {
          video.pause();
        }
      }

      // Cursor-follow play button
      component.addEventListener("mousemove", (e) => {
        playBtn.classList.remove("snap-back");
        const rect  = component.getBoundingClientRect();
        const size  = 64; // button width/height
        const half  = size / 2;
        const x     = e.clientX - rect.left - half;
        const y     = e.clientY - rect.top  - half;

        const clampedX = Math.min(Math.max(x, 0), rect.width  - half * 2);
        const clampedY = Math.min(Math.max(y, 0), rect.height - half * 2);

        playBtn.style.left      = clampedX + 'px';
        playBtn.style.top       = clampedY + 'px';
        playBtn.style.transform = "none";
      });

      // Fade out + shrink when cursor leaves the player
      component.addEventListener("mouseleave", () => {
        playBtn.style.transform = "scale(0.4)";
      });

      function updatePlayStateUI() {
        const playIcon  = playBtn.querySelector(".icon-play");
        const pauseIcon = playBtn.querySelector(".icon-pause");
        if (!video.paused) {
          playBtn.classList.add("playing");
          playIcon.style.display  = "none";
          pauseIcon.style.display = "block";
        } else {
          playBtn.classList.remove("playing");
          playIcon.style.display  = "block";
          pauseIcon.style.display = "none";
        }
      }

      function updateVolumeUI() {
        const mutedIcon = muteBtn.querySelector(".icon-muted");
        const lowIcon   = muteBtn.querySelector(".icon-volume-low");
        const highIcon  = muteBtn.querySelector(".icon-volume-high");
        if (isMuted || video.volume === 0) {
          mutedIcon.style.display = "block";
          lowIcon.style.display   = "none";
          highIcon.style.display  = "none";
          volSlider.value = 0;
        } else if (video.volume < 0.5) {
          mutedIcon.style.display = "none";
          lowIcon.style.display   = "block";
          highIcon.style.display  = "none";
          volSlider.value = video.volume;
        } else {
          mutedIcon.style.display = "none";
          lowIcon.style.display   = "none";
          highIcon.style.display  = "block";
          volSlider.value = video.volume;
        }
      }
    });
  </script>
</body>
</html>
