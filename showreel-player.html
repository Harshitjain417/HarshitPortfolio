<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Showreel Player</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700&display=swap" rel="stylesheet">

  <style>
    /* ==========================================================================
       SHOWREEL VIDEO PLAYER STYLING
       ========================================================================== */

    :root {
      /* CUSTOMIZABLE TOKENS - Edit these to style your showreel player */
      --vcp-border-radius: 16px;
      --vcp-aspect-ratio: 16/9;
      --vcp-max-width: 1100px;

      /* Play/Pause Button */
      --vcp-play-btn-size: 64px;
      --vcp-play-btn-radius: 50%;
      --vcp-play-btn-bg: #ffffff;
      --vcp-play-btn-color: #000000;
      --vcp-play-btn-hover: 1.1;

      /* Volume & Mute Controls */
      --vcp-volume-color: #ffffff;
      --vcp-volume-bg: #000000;
      --vcp-volume-bg-opacity: 0.75;
    }

    /* Reset and Centered Page Wrapper */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background-color: #08090c;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      overflow: hidden;
    }

    /* Main Component Wrapper */
    .vcp-component {
      position: relative;
      width: 100%;
      max-width: var(--vcp-max-width);
      margin: 0 auto;
      border-radius: var(--vcp-border-radius);
      overflow: hidden;
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.6), 0 0 1px rgba(255, 255, 255, 0.15);
      background-color: #000000;
    }

    /* Hide default cursor when inside the player */
    .vcp-component:hover {
      cursor: none;
    }

    /* Video aspect ratio box wrapper */
    .vcp-video-wrapper {
      position: relative;
      width: 100%;
      aspect-ratio: var(--vcp-aspect-ratio);
    }

    .vcp-video-wrapper video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* Center Play/Pause Overlay Button */
    .vcp-play-overlay-btn {
      position: absolute;
      /* JS drives the position via top/left px values */
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0);
      opacity: 0;
      width: var(--vcp-play-btn-size);
      height: var(--vcp-play-btn-size);
      border-radius: var(--vcp-play-btn-radius);
      background-color: var(--vcp-play-btn-bg);
      color: var(--vcp-play-btn-color);
      border: none;
      /* pointer-events none so it never blocks mouse tracking on the container */
      pointer-events: none;
      cursor: none;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 6;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
      /* Fast follow for position, smooth ease for scale/opacity */
      transition: opacity 0.3s ease, top 0.08s ease-out, left 0.08s ease-out, transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
      will-change: top, left, transform, opacity;
    }

    .vcp-play-overlay-btn svg {
      width: calc(var(--vcp-play-btn-size) * 0.375);
      height: calc(var(--vcp-play-btn-size) * 0.375);
      pointer-events: none;
    }

    /* Snap-back state: smooth ease to center when mouse leaves */
    .vcp-play-overlay-btn.snap-back {
      transition: opacity 0.3s ease, transform 0.5s cubic-bezier(0.25, 1, 0.5, 1);
    }

    /* Scale up slightly when playing to indicate pause action */
    .vcp-play-overlay-btn.playing-scale {
      transform: translate(-50%, -50%) scale(1.08);
    }

    /* Play state: fades when playing, reappears on hover */
    .vcp-play-overlay-btn.playing {
      opacity: 0;
    }

    .vcp-component:hover .vcp-play-overlay-btn.playing {
      opacity: 0.9;
    }

    /* Hide the follow-cursor button when mouse is over mute button */
    .vcp-component:has(.vcp-mute-btn:hover) .vcp-play-overlay-btn {
      opacity: 0 !important;
      transition: opacity 0.15s ease !important;
    }

    /* Small Sound Mute/Enable Button */
    .vcp-mute-btn {
      position: absolute;
      top: 24px;
      right: 24px;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      color: #ffffff;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer !important;
      opacity: 0;
      transition: opacity 0.25s ease, transform 0.2s, background 0.2s;
      z-index: 15;
    }

    .vcp-mute-btn * {
      cursor: pointer !important;
    }

    .vcp-mute-btn svg {
      width: 18px;
      height: 18px;
    }

    .vcp-mute-btn:hover {
      transform: scale(1.08);
      background: rgba(0, 0, 0, 0.7);
    }

    .vcp-mute-btn:active {
      transform: scale(0.95);
    }

    .vcp-component:hover .vcp-mute-btn {
      opacity: 1;
    }

    /* Minimalist Progress Scrubber Bar */
    .mini-scrubber-bar {
      position: absolute;
      bottom: 24px;
      left: 24px;
      right: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      cursor: pointer !important;
      pointer-events: auto;
      opacity: 0;
      transition: opacity 0.25s ease;
      z-index: 20;
    }

    .mini-scrubber-bar::before {
      content: '';
      position: absolute;
      left: 0;
      right: 0;
      height: 4px;
      background: rgba(255, 255, 255, 0.25);
      border-radius: 2px;
    }

    /* Hide the follow-cursor button when mouse is over scrubber bar */
    .vcp-component:has(.mini-scrubber-bar:hover) .vcp-play-overlay-btn {
      opacity: 0 !important;
      transition: opacity 0.15s ease !important;
    }

    .scrubber-progress {
      position: absolute;
      left: 0;
      height: 4px;
      width: 0%;
      background-color: #ffffff;
      border-radius: 2px;
      pointer-events: none;
    }

    /* Show Scrubber on hover */
    .vcp-component:hover .mini-scrubber-bar {
      opacity: 1;
    }
  </style>
</head>
<body>

  <!-- SINGLE VIDEO PLAYER COMPONENT -->
  <div class="vcp-component" id="showreel-player">

    <!-- Video element -->
    <div class="vcp-video-wrapper">
      <video id="video-element" src="AI%20SaaS.mp4" autoplay muted loop playsinline preload="auto"></video>
    </div>

    <!-- Center Play/Pause Overlay Button -->
    <button class="vcp-play-overlay-btn" id="play-overlay-btn" aria-label="Play Showreel">
      <!-- SVG Play Icon -->
      <svg class="icon-play" width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
        <path d="M8 5v14l11-7z"/>
      </svg>
      <!-- SVG Pause Icon -->
      <svg class="icon-pause" width="24" height="24" viewBox="0 0 24 24" fill="currentColor" style="display:none;">
        <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
      </svg>
    </button>

    <!-- Small Sound Mute/Enable Button (top right, visible on hover) -->
    <button class="vcp-mute-btn" id="btnMuteToggle" aria-label="Mute Toggle">
      <!-- Unmuted Icon SVG (Sound on) -->
      <svg class="icon-sound-on" viewBox="0 0 24 24" fill="currentColor" style="display: none;">
        <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
      </svg>
      <!-- Muted Icon SVG (Sound off) -->
      <svg class="icon-sound-off" viewBox="0 0 24 24" fill="currentColor">
        <path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.21.05-.42.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>
      </svg>
    </button>

    <!-- Ultra-Sleek Progress Scrubber (visible on hover) -->
    <div class="mini-scrubber-bar" id="scrubberBar">
      <div class="scrubber-progress" id="scrubberProgress"></div>
    </div>

  </div>

  <script>
    /**
     * Showreel Video Player - Standalone Script
     */

    document.addEventListener("DOMContentLoaded", () => {
      const video     = document.getElementById("video-element");
      const playBtn   = document.getElementById("play-overlay-btn");
      const btnMuteToggle = document.getElementById("btnMuteToggle");
      const iconSoundOn = btnMuteToggle.querySelector(".icon-sound-on");
      const iconSoundOff = btnMuteToggle.querySelector(".icon-sound-off");
      const scrubberProgress = document.getElementById("scrubberProgress");
      const component = document.getElementById("showreel-player");

      // Set default initial volume state
      video.muted = true;
      updateMuteUI();

      // Toggle play on overlay button click
      playBtn.addEventListener("click", togglePlay);

      // Toggle play when clicking the video element directly
      component.addEventListener("click", (e) => {
        if (e.target.closest("#btnMuteToggle") || e.target.closest("#play-overlay-btn") || e.target.closest("#scrubberBar")) return;
        togglePlay();
      });

      // Toggle mute on click
      btnMuteToggle.addEventListener("click", (e) => {
        e.stopPropagation();
        video.muted = !video.muted;
        updateMuteUI();
      });

      // Sync UI when video play state changes externally
      video.addEventListener("play",  updatePlayStateUI);
      video.addEventListener("pause", updatePlayStateUI);

      function togglePlay() {
        if (video.paused) {
          video.play().catch(() => {
            video.muted = true;
            updateMuteUI();
            video.play();
          });
        } else {
          video.pause();
        }
      }

      // Cursor-follow play button
      component.addEventListener("mousemove", (e) => {
        playBtn.classList.remove("snap-back");
        const rect  = component.getBoundingClientRect();
        const size  = 64; // button width/height
        const half  = size / 2;
        const x     = e.clientX - rect.left - half;
        const y     = e.clientY - rect.top  - half;

        const clampedX = Math.min(Math.max(x, 0), rect.width  - half * 2);
        const clampedY = Math.min(Math.max(y, 0), rect.height - half * 2);

        playBtn.style.left      = clampedX + 'px';
        playBtn.style.top       = clampedY + 'px';
        playBtn.style.opacity   = "";
        playBtn.style.transform = "scale(1)";
      });

      // Fade out + shrink when cursor leaves the player
      component.addEventListener("mouseleave", () => {
        playBtn.classList.add("snap-back");
        playBtn.style.opacity   = "0";
        playBtn.style.transform = "scale(0)";
      });

      function updatePlayStateUI() {
        const playIcon  = playBtn.querySelector(".icon-play");
        const pauseIcon = playBtn.querySelector(".icon-pause");
        if (!video.paused) {
          playBtn.classList.add("playing");
          playIcon.style.display  = "none";
          pauseIcon.style.display = "block";
        } else {
          playBtn.classList.remove("playing");
          playIcon.style.display  = "block";
          pauseIcon.style.display = "none";
        }
      }

      function updateMuteUI() {
        if (video.muted) {
          iconSoundOn.style.display = "none";
          iconSoundOff.style.display = "block";
        } else {
          iconSoundOn.style.display = "block";
          iconSoundOff.style.display = "none";
        }
      }

      // Update Progress Scrubber
      video.addEventListener("timeupdate", () => {
        if (!video.duration) return;
        const percent = (video.currentTime / video.duration) * 100;
        scrubberProgress.style.width = percent + "%";
      });

      video.addEventListener("ended", () => {
        scrubberProgress.style.width = "0%";
      });

      // Seeking logic
      const scrubberBar = document.getElementById("scrubberBar");
      let isDragging = false;

      function seek(e) {
        if (!video.duration) return;
        const rect = scrubberBar.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        let pos = (clientX - rect.left) / rect.width;
        pos = Math.max(0, Math.min(1, pos));
        video.currentTime = pos * video.duration;
        scrubberProgress.style.width = (pos * 100) + "%";
      }

      if (scrubberBar) {
        scrubberBar.addEventListener("mousedown", (e) => {
          e.stopPropagation();
          isDragging = true;
          seek(e);
        });

        window.addEventListener("mousemove", (e) => {
          if (isDragging) seek(e);
        });

        window.addEventListener("mouseup", () => {
          isDragging = false;
        });

        scrubberBar.addEventListener("touchstart", (e) => {
          e.stopPropagation();
          isDragging = true;
          seek(e);
        }, { passive: true });

        window.addEventListener("touchmove", (e) => {
          if (isDragging) seek(e);
        }, { passive: true });

        window.addEventListener("touchend", () => {
          isDragging = false;
        });
      }

      // On metadata loaded
      video.addEventListener("loadedmetadata", () => {
        updateMuteUI();
      });
    });
  </script>
</body>
</html>
